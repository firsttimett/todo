name: Warm up Cloud Run revision
description: >
  Polls a tagged Cloud Run revision URL until /health returns 200. Avoids
  cold-start timeouts in Playwright (cold starts can exceed the 10s
  per-test default).

inputs:
  revision_url:
    description: Tagged Cloud Run revision URL to poll (e.g. https://pr-42---svc-hash-uc.a.run.app)
    required: true
  id_token:
    description: Google ID token with the Cloud Run service URL as audience
    required: true

runs:
  using: composite
  steps:
    - name: Warm up revision
      shell: bash
      run: |
        echo "Polling: ${{ inputs.revision_url }}/health"
        for i in $(seq 1 20); do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            -H "Authorization: Bearer ${{ inputs.id_token }}" \
            "${{ inputs.revision_url }}/health" || echo "000")
          echo "Attempt $i: status=$STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Backend is ready"
            exit 0
          fi
          sleep 5
        done
        echo "Backend did not become ready in time"
        exit 1
