name: Restore frontend artifact
description: Download and extract the packaged frontend release artifact.

inputs:
  artifact_name:
    description: Name of the uploaded frontend artifact.
    required: true
  download_path:
    description: Directory where the artifact should be downloaded.
    required: false
    default: /tmp/frontend-release
  frontend_dir:
    description: Frontend working directory where the artifact should be restored.
    required: false
    default: frontend

runs:
  using: composite
  steps:
    - name: Download frontend artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ inputs.artifact_name }}
        path: ${{ inputs.download_path }}

    - name: Restore frontend artifact
      shell: bash
      run: tar -xzf "${{ inputs.download_path }}/frontend-release.tgz" -C "${{ inputs.frontend_dir }}"
