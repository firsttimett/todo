name: Set up Firebase CLI
description: Set up Node.js and install the Firebase CLI for Hosting operations.

inputs:
  node_version:
    description: Node.js version to install.
    required: false
    default: "24"
  cache_npm:
    description: Whether to enable npm dependency caching for setup-node.
    required: false
    default: "false"
  cache_dependency_path:
    description: package-lock.json path used when npm caching is enabled.
    required: false
    default: frontend/package-lock.json

runs:
  using: composite
  steps:
    - name: Set up Node.js with npm cache
      if: ${{ inputs.cache_npm == 'true' }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ inputs.node_version }}
        cache: npm
        cache-dependency-path: ${{ inputs.cache_dependency_path }}

    - name: Set up Node.js
      if: ${{ inputs.cache_npm != 'true' }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ inputs.node_version }}

    - name: Install Firebase CLI
      shell: bash
      run: npm install -g firebase-tools
