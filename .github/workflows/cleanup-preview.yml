name: Cleanup preview environment

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to clean up (use when automatic cleanup on PR close failed)"
        required: true
        type: number

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TAG: pr-${{ github.event.number || inputs.pr_number }}
  DB: nnow-pr-${{ github.event.number || inputs.pr_number }}

permissions:
  contents: read
  id-token: write

jobs:
  cleanup:
    name: Remove PR preview resources
    runs-on: ubuntu-latest
    environment: preview

    steps:
      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          project_id: tfcd-infra

      - name: Check preview resources exist
        id: check
        run: |
          TAG_COUNT=$(gcloud run services describe nnow-nonprod \
            --region asia-southeast1 \
            --project tfcd-nonprod \
            --format="value(status.traffic[].tag)" | grep -c "^${{ env.TAG }}$" || true)
          echo "tag_exists=$([[ $TAG_COUNT -gt 0 ]] && echo true || echo false)" >> $GITHUB_OUTPUT

          DB_NAME=$(gcloud firestore databases describe \
            --database=${{ env.DB }} \
            --project=tfcd-nonprod \
            --format="value(name)" 2>/dev/null || true)
          echo "db_exists=$([[ -n "$DB_NAME" ]] && echo true || echo false)" >> $GITHUB_OUTPUT

          # Impersonate firebase-cicd-nonprod for the Firebase Hosting API —
          # the WIF principal itself has no firebasehosting.* roles.
          FB_TOKEN=$(gcloud auth print-access-token \
            --impersonate-service-account=firebase-cicd-nonprod@tfcd-infra.iam.gserviceaccount.com)
          HTTP_STATUS=$(curl -s -o /tmp/fb_response.txt -w "%{http_code}" \
            -H "Authorization: Bearer $FB_TOKEN" \
            "https://firebasehosting.googleapis.com/v1beta1/projects/tfcd-nonprod/sites/tfcd-nonprod/channels/${{ env.TAG }}")
          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/fb_response.txt
          CHANNEL_EXISTS=$([[ "$HTTP_STATUS" == "200" ]] && echo true || echo false)
          echo "channel_exists=$CHANNEL_EXISTS" >> $GITHUB_OUTPUT

      - name: Fail if no resources found
        if: steps.check.outputs.tag_exists == 'false' && steps.check.outputs.db_exists == 'false' && steps.check.outputs.channel_exists == 'false'
        run: |
          echo "No preview resources found for ${{ env.TAG }}. Invalid PR number or already cleaned up."
          exit 1

      - name: Remove Cloud Run revision tag
        if: steps.check.outputs.tag_exists == 'true'
        # Removes the tag (untagged revisions are still retained by Cloud Run GC policy)
        run: |
          gcloud run services update-traffic nnow-nonprod \
            --region asia-southeast1 \
            --project tfcd-nonprod \
            --remove-tags ${{ env.TAG }} \
            --quiet

      - name: Delete PR Firestore database
        if: steps.check.outputs.db_exists == 'true'
        run: |
          gcloud firestore databases delete \
            --database=${{ env.DB }} \
            --project=tfcd-nonprod \
            --quiet

      - name: Remove Firebase Hosting preview channel
        if: steps.check.outputs.channel_exists == 'true'
        run: |
          FB_TOKEN=$(gcloud auth print-access-token \
            --impersonate-service-account=firebase-cicd-nonprod@tfcd-infra.iam.gserviceaccount.com)
          curl -sf -X DELETE \
            -H "Authorization: Bearer $FB_TOKEN" \
            "https://firebasehosting.googleapis.com/v1beta1/projects/tfcd-nonprod/sites/tfcd-nonprod/channels/${{ env.TAG }}"
