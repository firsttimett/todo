name: Cleanup preview environment

on:
  # SECURITY: Do not change this to pull_request_target. Fork PRs would inherit cloud credentials.
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to clean up (use when automatic cleanup on PR close failed)"
        required: true
        type: number

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TAG: pr-${{ github.event.number || inputs.pr_number }}
  DB: nnow-pr-${{ github.event.number || inputs.pr_number }}

permissions:
  contents: read
  id-token: write

concurrency:
  group: preview-pr-${{ github.event.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  cleanup:
    name: Remove PR preview resources
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.user.login != 'dependabot[bot]' &&
        github.event.pull_request.head.repo.full_name == github.repository
      )
    runs-on: ubuntu-latest
    environment: preview

    steps:
      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          project_id: tfcd-infra

      - name: Check preview resources exist
        id: check
        run: |
          TAGS=$(gcloud run services describe nnow-nonprod \
            --region asia-southeast1 \
            --project tfcd-nonprod \
            --format="value(status.traffic[].tag)")
          if printf '%s\n' "$TAGS" | tr ';' '\n' | grep -Fxq "${{ env.TAG }}"; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

          if DB_OUT=$(gcloud firestore databases describe \
            --database=${{ env.DB }} \
            --project=tfcd-nonprod \
            --format="value(name)" 2>&1); then
            echo "db_exists=true" >> "$GITHUB_OUTPUT"
          elif echo "$DB_OUT" | grep -Eqi "not found|does not exist"; then
            echo "db_exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "$DB_OUT"
            exit 1
          fi

      - name: Authenticate as Firebase CI service account
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          service_account: firebase-cicd-nonprod@tfcd-infra.iam.gserviceaccount.com
          project_id: tfcd-nonprod

      - name: Check preview channel exists
        id: channel
        run: |
          FB_TOKEN=$(gcloud auth print-access-token)
          HTTP_STATUS=$(curl -sS -o /tmp/firebase-channel-response.json -w "%{http_code}" \
            -H "Authorization: Bearer $FB_TOKEN" \
            "https://firebasehosting.googleapis.com/v1beta1/projects/tfcd-nonprod/sites/tfcd-nonprod/channels/${{ env.TAG }}")
          case "$HTTP_STATUS" in
            200)
              echo "channel_exists=true" >> "$GITHUB_OUTPUT"
              ;;
            404)
              echo "channel_exists=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              cat /tmp/firebase-channel-response.json
              echo "Unexpected Firebase Hosting API status: $HTTP_STATUS"
              exit 1
              ;;
          esac

      - name: Nothing to clean up
        if: steps.check.outputs.tag_exists == 'false' && steps.check.outputs.db_exists == 'false' && steps.channel.outputs.channel_exists == 'false'
        run: |
          echo "No preview resources found for ${{ env.TAG }}; cleanup is already complete."
          echo "### Preview cleanup" >> "$GITHUB_STEP_SUMMARY"
          echo "No resources found for \`${{ env.TAG }}\`; cleanup is already complete." >> "$GITHUB_STEP_SUMMARY"

      - name: Authenticate to GCP via Workload Identity Federation for cloud cleanup
        if: steps.check.outputs.tag_exists == 'true' || steps.check.outputs.db_exists == 'true'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          project_id: tfcd-infra

      - name: Remove Cloud Run revision tag
        if: steps.check.outputs.tag_exists == 'true'
        # Removes the tag (untagged revisions are still retained by Cloud Run GC policy)
        run: |
          gcloud run services update-traffic nnow-nonprod \
            --region asia-southeast1 \
            --project tfcd-nonprod \
            --remove-tags ${{ env.TAG }} \
            --quiet

      - name: Delete PR Firestore database
        if: steps.check.outputs.db_exists == 'true'
        run: |
          gcloud firestore databases delete \
            --database=${{ env.DB }} \
            --project=tfcd-nonprod \
            --quiet

      - name: Authenticate as Firebase CI service account for channel deletion
        if: steps.channel.outputs.channel_exists == 'true'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          service_account: firebase-cicd-nonprod@tfcd-infra.iam.gserviceaccount.com
          project_id: tfcd-nonprod

      - name: Delete Firebase Hosting preview channel
        if: steps.channel.outputs.channel_exists == 'true'
        run: |
          FB_TOKEN=$(gcloud auth print-access-token)
          curl -sf -X DELETE \
            -H "Authorization: Bearer $FB_TOKEN" \
            "https://firebasehosting.googleapis.com/v1beta1/projects/tfcd-nonprod/sites/tfcd-nonprod/channels/${{ env.TAG }}"
