name: Cleanup preview environment

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to clean up (use when automatic cleanup on PR close failed)"
        required: true
        type: number

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TAG: pr-${{ github.event.number || inputs.pr_number }}
  DB: nnow-pr-${{ github.event.number || inputs.pr_number }}

permissions:
  contents: read
  id-token: write

jobs:
  cleanup:
    name: Remove PR preview resources
    runs-on: ubuntu-latest
    environment: preview

    steps:
      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          project_id: tfcd-infra

      - name: Remove Cloud Run revision tag
        # Removes the tag (untagged revisions are still retained by Cloud Run GC policy)
        run: |
          gcloud run services update-traffic nnow-nonprod \
            --region asia-southeast1 \
            --project tfcd-nonprod \
            --remove-tags ${{ env.TAG }} \
            --quiet

      - name: Delete PR Firestore database
        run: |
          gcloud firestore databases delete ${{ env.DB }} \
            --project=tfcd-nonprod \
            --quiet

      - name: Remove Firebase Hosting preview channel
        run: |
          npx firebase-tools@latest hosting:channel:delete pr-${{ github.event.number }} \
            --project tfcd-nonprod \
            --force
