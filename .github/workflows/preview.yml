name: Preview

on:
  # SECURITY: Do not change this to pull_request_target. Fork PRs would inherit cloud credentials.
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  IMAGE: asia-southeast1-docker.pkg.dev/tfcd-infra/nnow/backend:pr-${{ github.event.number }}
  TAG: pr-${{ github.event.number }}
  DB: nnow-pr-${{ github.event.number }}

permissions:
  contents: read
  id-token: write

concurrency:
  group: preview-pr-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Build · Deploy · Test
    if: >-
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.firebase-deploy.outputs.details_url }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          project_id: tfcd-infra

      - name: Create Firestore database for PR
        run: |
          # Idempotent — safe to re-run on push to existing PR.
          # Use || {} so set -e doesn't exit before we inspect the output.
          # "already exists" is a success condition; any other error fails the step.
          CREATE_OUT=$(gcloud firestore databases create \
            --database=${{ env.DB }} \
            --location=asia-southeast1 \
            --project=tfcd-nonprod \
            --quiet 2>&1) || {
            echo "$CREATE_OUT"
            echo "$CREATE_OUT" | grep -q "already exists"
          }

      - name: Build and deploy app
        uses: ./.github/actions/build-deploy-cloudrun
        with:
          image: ${{ env.IMAGE }}
          service: nnow-nonprod
          project: tfcd-nonprod
          revision_tag: ${{ env.TAG }}
          update_env_vars: FIRESTORE_DATABASE=${{ env.DB }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Generate firebase.json (rewrite pinned to PR revision)
        working-directory: frontend
        run: ENV=nonprod envsubst < firebase.json.tpl > firebase.json

      - name: Authenticate as Firebase CI service account
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          service_account: firebase-cicd-nonprod@tfcd-infra.iam.gserviceaccount.com
          project_id: tfcd-nonprod

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy preview channel to Firebase Hosting
        id: firebase-deploy
        working-directory: frontend
        env:
          FIREBASE_CLI_EXPERIMENTS: pintags
          CHANNEL_ID: pr-${{ github.event.number }}
        run: |
          DEPLOY_JSON=$(firebase hosting:channel:deploy "$CHANNEL_ID" \
            --project tfcd-nonprod \
            --expires 30d \
            --json)
          echo "$DEPLOY_JSON"
          DETAILS_URL=$(echo "$DEPLOY_JSON" | jq -r '[.. | objects | .url? | select(type == "string" and startswith("https://"))][0] // empty')
          if [ -z "$DETAILS_URL" ]; then
            echo "::error::Firebase CLI did not return a preview URL."
            exit 1
          fi
          echo "details_url=$DETAILS_URL" >> "$GITHUB_OUTPUT"

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Warm up Cloud Run revision
        uses: ./.github/actions/warm-up-revision
        with:
          service: nnow-nonprod
          project: tfcd-nonprod
          tag: ${{ env.TAG }}

      - name: Run E2E tests against preview channel
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.firebase-deploy.outputs.details_url }}
          OTP_BYPASS_CODE: ${{ secrets.OTP_BYPASS_CODE }}
        run: npx playwright test --project=chromium

      - name: Upload Playwright report if there's test failure
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-report-pr-${{ github.event.number }}
          path: frontend/playwright-report/
          retention-days: 7
