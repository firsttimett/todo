name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to roll back
        required: true
        type: choice
        options: [staging, production]
      revision:
        description: Cloud Run revision to roll back to (leave empty for previous revision)
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  gate:
    name: Approve rollback
    runs-on: ubuntu-latest
    if: inputs.environment == 'production'
    environment:
      name: production-gate

    steps:
      - name: Acknowledge
        run: echo "Rollback approved. Proceeding."

  rollback:
    name: Rollback ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [gate]
    if: always() && (needs.gate.result == 'success' || needs.gate.result == 'skipped')
    environment:
      name: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}

      - name: Resolve target revision
        id: resolve
        env:
          SERVICE: nnow-${{ inputs.environment == 'production' && 'prod' || 'staging' }}
          REGION: asia-southeast1
          PROJECT: ${{ inputs.environment == 'production' && 'tfcd-prod' || 'tfcd-nonprod' }}
        run: |
          if [ -n "${{ inputs.revision }}" ]; then
            echo "revision=${{ inputs.revision }}" >> $GITHUB_OUTPUT
          else
            PREV=$(gcloud run revisions list \
              --service=$SERVICE \
              --region=$REGION \
              --project=$PROJECT \
              --format="value(metadata.name)" \
              --sort-by="~metadata.creationTimestamp" \
              --limit=2 | tail -1)
            echo "revision=$PREV" >> $GITHUB_OUTPUT
          fi

      - name: Roll back Cloud Run traffic to ${{ steps.resolve.outputs.revision }}
        env:
          SERVICE: nnow-${{ inputs.environment == 'production' && 'prod' || 'staging' }}
          REGION: asia-southeast1
          PROJECT: ${{ inputs.environment == 'production' && 'tfcd-prod' || 'tfcd-nonprod' }}
        run: |
          gcloud run services update-traffic $SERVICE \
            --region=$REGION \
            --project=$PROJECT \
            --to-revisions=${{ steps.resolve.outputs.revision }}=100

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Roll back Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT: ${{ inputs.environment == 'production' && 'tfcd-prod' || 'tfcd-nonprod' }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json \
            firebase hosting:rollback \
            --project $FIREBASE_PROJECT \
            --force
