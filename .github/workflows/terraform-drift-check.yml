name: Terraform drift check

on:
  schedule:
    # "At 09:00 AM, Monday through Friday."
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  drift_staging:
    name: Drift check — staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/terraform/environments/staging
        run: terraform init

      - name: Terraform plan
        working-directory: infra/terraform/environments/staging
        env:
          TF_VAR_jwt_public_key: ${{ secrets.JWT_PUBLIC_KEY }}
          TF_VAR_jwt_private_key: ${{ secrets.JWT_PRIVATE_KEY }}
          TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}
          TF_VAR_resend_from_email: ${{ secrets.RESEND_FROM_EMAIL }}
          TF_VAR_otp_bypass_code: ${{ secrets.OTP_BYPASS_CODE }}
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan
          EXIT_CODE=$?
          set -e

          echo "<details><summary>Terraform plan — staging</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

          if [ "$EXIT_CODE" -eq 2 ]; then
            echo "::warning::Drift detected in staging — run deploy-staging or apply manually."
            exit 1
          elif [ "$EXIT_CODE" -eq 1 ]; then
            echo "Terraform plan error in staging"
            exit 1
          fi
          echo "No drift in staging"

  drift_production:
    name: Drift check — production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/terraform/environments/production
        run: terraform init

      - name: Terraform plan
        working-directory: infra/terraform/environments/production
        env:
          TF_VAR_jwt_public_key: ${{ secrets.JWT_PUBLIC_KEY }}
          TF_VAR_jwt_private_key: ${{ secrets.JWT_PRIVATE_KEY }}
          TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}
          TF_VAR_resend_from_email: ${{ secrets.RESEND_FROM_EMAIL }}
          TF_VAR_otp_bypass_code: ""
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan
          EXIT_CODE=$?
          set -e

          echo "<details><summary>Terraform plan — production</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

          if [ "$EXIT_CODE" -eq 2 ]; then
            echo "::warning::Drift detected in production — run deploy-production or apply manually."
            exit 1
          elif [ "$EXIT_CODE" -eq 1 ]; then
            echo "Terraform plan error in production"
            exit 1
          fi
          echo "No drift in production"
