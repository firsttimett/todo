name: Checks

on:
  # SECURITY: Do not change this to pull_request_target. The OIDC Terraform plan
  # job relies on pull_request same-repo checks before minting cloud credentials.
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      terraform: ${{ steps.filter.outputs.terraform }}
      terraform_staging: ${{ steps.filter.outputs.terraform_staging }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            backend:
              - ".github/workflows/ci.yml"
              - "pyproject.toml"
              - "backend/**"
            frontend:
              - ".github/workflows/ci.yml"
              - "frontend/**"
            terraform:
              - ".github/workflows/ci.yml"
              - "infra/terraform/**"
            terraform_staging:
              - ".github/workflows/ci.yml"
              - "infra/terraform/environments/staging/**"
              - "infra/terraform/modules/**"

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Ruff check
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy .

      - name: Run backend tests
        run: uv run pytest

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm test

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run stub E2E tests
        run: npm run test:e2e:stub -- --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-stub-report
          path: frontend/playwright-report/
          retention-days: 7

  docker-build:
    name: Verify Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build app image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: nnow/app:ci

  terraform-validate:
    name: Terraform fmt + validate
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.terraform == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive infra/terraform/

      - name: Terraform validate (staging + production)
        run: |
          for dir in infra/terraform/environments/staging infra/terraform/environments/production; do
            terraform -chdir="$dir" init -backend=false
            terraform -chdir="$dir" validate
          done

  terraform-plan-staging:
    name: Terraform plan (staging)
    runs-on: ubuntu-latest
    needs: [changes, terraform-validate]
    if: >-
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.changes.outputs.terraform_staging == 'true'
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: terraform-plan-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    env:
      # Dummy values — PR plans are advisory; real values used at deploy time.
      TF_VAR_jwt_public_key: "pr-plan-dummy"
      TF_VAR_jwt_private_key: "pr-plan-dummy"
      TF_VAR_resend_api_key: "pr-plan-dummy"
      TF_VAR_resend_from_email: "pr-plan-dummy"
      TF_VAR_otp_bypass_code: "pr-plan-dummy"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          project_id: tfcd-nonprod

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/terraform/environments/staging
        run: terraform init

      - name: Terraform plan
        working-directory: infra/terraform/environments/staging
        # PR plans are advisory and run with dummy secret inputs. Do not refresh
        # live resources here: the PR WIF principal is intentionally limited to
        # staging tfstate read access and cannot read Secret Manager metadata or
        # Firestore database metadata.
        run: terraform plan -refresh=false -lock=false -out=tfplan -no-color

      - name: Post plan to job summary
        working-directory: infra/terraform/environments/staging
        run: |
          echo "<details><summary>Terraform plan — staging (PR #${{ github.event.pull_request.number }})</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
