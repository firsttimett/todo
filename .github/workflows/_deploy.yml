name: Deploy pipeline

on:
  workflow_call:
    inputs:
      # ── Required for all environments ────────────────────────────────────────
      environment:
        required: true
        type: string
      frontend_url:
        required: true
        type: string
      suffix:
        required: true
        type: string
      gcp_project:
        required: true
        type: string
      terraform_dir:
        required: true
        type: string
      firebase_project_id:
        required: true
        type: string
      firestore_database:
        required: true
        type: string
        description: "Firestore database name (e.g. nnow-nonprod). Passed as FIRESTORE_DATABASE to Cloud Run to prevent inheritance from PR preview revisions."

      # ── Staging-only ──────────────────────────────────────────────────────────
      use_otp_bypass:
        required: false
        type: boolean
        default: false
        description: "Pass OTP_BYPASS_CODE secret to Terraform. Staging only — never set for production."
      run_e2e:
        required: false
        type: boolean
        default: false
        description: "Run E2E tests against a pre-flip Firebase preview channel before traffic flip. Enable for staging."

      # ── Production / image promotion ──────────────────────────────────────────
      git_sha:
        required: false
        type: string
        default: ""
        description: "SHA to tag the image with or promote. Defaults to github.sha when empty; set explicitly for production promotion."
      skip_build:
        required: false
        type: boolean
        default: false
        description: "Skip Docker build/push and deploy an existing image. Set to true for production promotion."

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  id-token: write

jobs:
  terraform_plan:
    name: Terraform plan
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    env:
      TF_VAR_jwt_public_key: ${{ secrets.JWT_PUBLIC_KEY }}
      TF_VAR_jwt_private_key: ${{ secrets.JWT_PRIVATE_KEY }}
      TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}
      TF_VAR_resend_from_email: ${{ secrets.RESEND_FROM_EMAIL }}
      TF_VAR_otp_bypass_code: ${{ inputs.use_otp_bypass && secrets.OTP_BYPASS_CODE || '' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.git_sha || github.sha }}

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ inputs.terraform_dir }}
        run: terraform init

      - name: Terraform plan
        working-directory: ${{ inputs.terraform_dir }}
        run: terraform plan -out=tfplan

      - name: Post plan to job summary
        working-directory: ${{ inputs.terraform_dir }}
        run: |
          echo "<details><summary>Terraform plan — ${{ inputs.environment }}</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: Upload plan artifact
        if: inputs.environment == 'production'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tfplan-production-${{ github.run_id }}
          path: ${{ inputs.terraform_dir }}/tfplan
          retention-days: 1

      - name: Terraform apply (staging)
        if: inputs.environment != 'production'
        working-directory: ${{ inputs.terraform_dir }}
        run: terraform apply tfplan

  terraform_gate:
    name: Approve Terraform apply
    # Pauses for a reviewer to inspect the plan summary in terraform_plan before proceeding.
    # Requires the "production-gate" GitHub environment to have a required reviewer configured.
    # The "production" environment must NOT have a reviewer — all other prod jobs use it without pausing.
    if: inputs.environment == 'production'
    runs-on: ubuntu-latest
    needs: [terraform_plan]
    environment:
      name: production-gate

    steps:
      - name: Acknowledge
        run: echo "Plan reviewed and approved. Terraform apply will now proceed."

  terraform_apply:
    name: Terraform apply (production)
    if: inputs.environment == 'production'
    runs-on: ubuntu-latest
    needs: [terraform_plan, terraform_gate]
    environment:
      name: ${{ inputs.environment }}
    env:
      TF_VAR_jwt_public_key: ${{ secrets.JWT_PUBLIC_KEY }}
      TF_VAR_jwt_private_key: ${{ secrets.JWT_PRIVATE_KEY }}
      TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}
      TF_VAR_resend_from_email: ${{ secrets.RESEND_FROM_EMAIL }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.git_sha || github.sha }}

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ inputs.terraform_dir }}
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tfplan-production-${{ github.run_id }}
          path: ${{ inputs.terraform_dir }}

      - name: Terraform apply
        working-directory: ${{ inputs.terraform_dir }}
        run: terraform apply tfplan

  check_live_pin:
    name: Check if live channel is pinned
    # firebase-tools refuses to deploy a pinned preview against an unpinned live
    # channel. We gate the e2e job on this so first-time pinTag rollout on a
    # Hosting site (or recovery from drift) skips e2e once and lets the release
    # job pin live as a side effect of its normal hosting deploy.
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    outputs:
      pinned: ${{ steps.check.outputs.pinned }}

    steps:
      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          service_account: firebase-cicd-${{ inputs.suffix }}@tfcd-infra.iam.gserviceaccount.com
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}

      - name: Check live channel rewrite pin status
        id: check
        run: |
          TOKEN=$(gcloud auth print-access-token)
          PINNED=$(curl -fsS \
            -H "Authorization: Bearer $TOKEN" \
            "https://firebasehosting.googleapis.com/v1beta1/projects/${{ inputs.firebase_project_id }}/sites/${{ inputs.firebase_project_id }}/channels/live/releases?pageSize=1" \
            | jq -r '[.releases[]?.version.config.rewrites[]? | select(.run.tag)] | if length > 0 then "yes" else "no" end')
          echo "Live channel pin status: $PINNED"
          echo "pinned=$PINNED" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [terraform_plan, terraform_gate, terraform_apply]
    if: |
      always() &&
      needs.terraform_plan.result == 'success' &&
      (needs.terraform_gate.result == 'success' || needs.terraform_gate.result == 'skipped') &&
      (needs.terraform_apply.result == 'success' || needs.terraform_apply.result == 'skipped')
    environment:
      name: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.git_sha || github.sha }}

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}

      - name: Build and deploy app
        uses: ./.github/actions/build-deploy-cloudrun
        with:
          image: asia-southeast1-docker.pkg.dev/tfcd-infra/nnow/backend:${{ inputs.git_sha || github.sha }}
          service: nnow-${{ inputs.suffix }}
          project: ${{ inputs.gcp_project }}
          revision_tag: new
          skip_build: ${{ inputs.skip_build }}
          update_env_vars: FIRESTORE_DATABASE=${{ inputs.firestore_database }}

  frontend_artifact:
    name: Build frontend artifact
    runs-on: ubuntu-latest
    needs: [terraform_plan, terraform_gate, terraform_apply]
    if: |
      always() &&
      needs.terraform_plan.result == 'success' &&
      (needs.terraform_gate.result == 'success' || needs.terraform_gate.result == 'skipped') &&
      (needs.terraform_apply.result == 'success' || needs.terraform_apply.result == 'skipped')
    environment:
      name: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.git_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=critical
          npm run build

      - name: Generate firebase.json for env
        working-directory: frontend
        run: ENV=${{ inputs.suffix }} envsubst < firebase.json.tpl > firebase.json

      - name: Package frontend artifact
        run: tar -czf frontend-release.tgz -C frontend dist firebase.json

      - name: Upload frontend artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-release-${{ github.run_id }}
          path: frontend-release.tgz
          retention-days: 1

  e2e:
    name: E2E Firebase preview (staging only)
    # Skipped on bootstrap (live unpinned), refers to check_live_pin job for more details
    # release will pin live as a side effect, and e2e runs normally on subsequent deploys.
    if: |
      always() &&
      inputs.run_e2e &&
      inputs.environment == 'staging' &&
      needs.deploy.result == 'success' &&
      needs.frontend_artifact.result == 'success' &&
      needs.check_live_pin.outputs.pinned == 'yes'
    runs-on: ubuntu-latest
    needs: [deploy, frontend_artifact, check_live_pin]
    environment:
      name: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.git_sha || github.sha }}

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          service_account: firebase-cicd-${{ inputs.suffix }}@tfcd-infra.iam.gserviceaccount.com
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}

      - name: Download frontend artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-release-${{ github.run_id }}
          path: /tmp/frontend-release

      - name: Restore frontend artifact
        run: tar -xzf /tmp/frontend-release/frontend-release.tgz -C frontend

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies and Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Compute short SHA for channel ID
        id: sha
        run: |
          SHA="${{ inputs.git_sha || github.sha }}"
          echo "short=${SHA:0:8}" >> $GITHUB_OUTPUT

      - name: Deploy pre-flip preview channel
        id: firebase-preview
        working-directory: frontend
        env:
          FIREBASE_CLI_EXPERIMENTS: pintags
          FIREBASE_PROJECT: ${{ inputs.firebase_project_id }}
          CHANNEL_ID: pre-${{ steps.sha.outputs.short }}
        run: |
          DEPLOY_JSON=$(firebase hosting:channel:deploy "$CHANNEL_ID" \
            --project "$FIREBASE_PROJECT" \
            --expires 30m \
            --json)
          echo "$DEPLOY_JSON"
          DETAILS_URL=$(echo "$DEPLOY_JSON" | jq -r '[.. | objects | .url? | select(type == "string" and startswith("https://"))][0] // empty')
          if [ -z "$DETAILS_URL" ]; then
            echo "::error::Firebase CLI did not return a preview URL."
            exit 1
          fi
          echo "details_url=$DETAILS_URL" >> "$GITHUB_OUTPUT"

      - name: Warm up new Cloud Run revision
        uses: ./.github/actions/warm-up-revision
        with:
          service: nnow-${{ inputs.suffix }}
          project: ${{ inputs.gcp_project }}
          tag: new

      - name: Run E2E tests against pre-flip preview
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.firebase-preview.outputs.details_url }}
          OTP_BYPASS_CODE: ${{ secrets.OTP_BYPASS_CODE }}
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-report-${{ inputs.environment }}-pre-flip
          path: frontend/playwright-report/
          retention-days: 7

  smoke:
    name: Smoke test new Cloud Run revision (prod only)
    if: inputs.environment == 'production'
    runs-on: ubuntu-latest
    needs: [deploy]
    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}

      - name: Smoke test new revision
        run: |
          REVISION_URL=$(gcloud run services describe nnow-${{ inputs.suffix }} \
            --project=${{ inputs.gcp_project }} \
            --region=asia-southeast1 \
            --format=json \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for t in data.get('status', {}).get('traffic', []):
              if t.get('tag') == 'new':
                  print(t.get('url', ''))
                  sys.exit(0)
          print('')
          ")
          echo "Smoke-testing revision: $REVISION_URL"

          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$REVISION_URL/health")
          [ "$STATUS" = "200" ] || { echo "Health check failed: $STATUS"; exit 1; }
          echo "Health: OK"

          # Expect 401 without a token — 5xx or connection error means something is wrong
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$REVISION_URL/api/todo/todos" || echo "000")
          [ "$STATUS" = "401" ] || { echo "Auth guard failed: expected 401, got $STATUS"; exit 1; }
          echo "Auth guard: OK"

  release:
    name: Release to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [deploy, frontend_artifact, e2e, smoke]
    if: |
      always() &&
      needs.deploy.result == 'success' &&
      needs.frontend_artifact.result == 'success' &&
      (needs.e2e.result == 'success' || needs.e2e.result == 'skipped') &&
      (needs.smoke.result == 'success' || needs.smoke.result == 'skipped')
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.frontend_url }}

    outputs:
      frontend_url: ${{ inputs.frontend_url }}
      new_revision: ${{ steps.new.outputs.revision }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.git_sha || github.sha }}

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          service_account: firebase-cicd-${{ inputs.suffix }}@tfcd-infra.iam.gserviceaccount.com
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}

      - name: Download frontend artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-release-${{ github.run_id }}
          path: /tmp/frontend-release

      - name: Restore frontend artifact
        run: tar -xzf /tmp/frontend-release/frontend-release.tgz -C frontend

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Resolve new Cloud Run revision
        id: new
        run: |
          NEW=$(gcloud run services describe nnow-${{ inputs.suffix }} \
            --region asia-southeast1 \
            --project ${{ inputs.gcp_project }} \
            --format=json \
            | python3 -c "
          import json, sys

          data = json.load(sys.stdin)
          status = data.get('status', {})
          latest = status.get('latestReadyRevisionName', '')
          new_revision = ''

          for traffic in status.get('traffic', []):
              if traffic.get('tag') == 'new':
                  new_revision = traffic.get('revisionName', '')
                  break

          if not new_revision:
              sys.stderr.write('No Cloud Run revision tagged new was found.\n')
              sys.exit(1)

          if new_revision != latest:
              sys.stderr.write(
                  f'Cloud Run tag new points to {new_revision}, but latest ready revision is {latest}.\n'
              )
              sys.exit(1)

          print(new_revision)
          ")
          echo "New revision: $NEW"
          echo "revision=$NEW" >> $GITHUB_OUTPUT

      - name: Deploy frontend to Firebase Hosting
        id: firebase-deploy
        working-directory: frontend
        env:
          FIREBASE_CLI_EXPERIMENTS: pintags
          FIREBASE_PROJECT: ${{ inputs.firebase_project_id }}
        run: |
          firebase deploy \
            --only hosting \
            --project "$FIREBASE_PROJECT" \
            --json

  live_health_watch:
    name: Watch live Firebase health (prod only)
    # Polls the live frontend every 30s for 5 minutes after the Firebase Hosting
    # live deploy. Rollback and Cloud Run traffic promotion are separate jobs so
    # this polling job does not receive secrets or OIDC credentials.
    # Cloud Monitoring 5xx-rate check is a future enhancement once revision-level
    # metric filtering and IAM permissions are verified.
    #
    # always() is required: e2e is skipped for production, and GitHub Actions
    # propagates skip status transitively through the dependency chain. Without
    # always(), this job is skipped even though release succeeded.
    if: always() && inputs.environment == 'production' && needs.release.result == 'success'
    runs-on: ubuntu-latest
    needs: [release]
    permissions: {}
    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Watch live health
        id: watch
        env:
          FRONTEND_URL: ${{ inputs.frontend_url }}
        run: |
          echo "Watching live Firebase Hosting for 5 minutes (10 polls × 30s)"
          FAILED=0

          for i in $(seq 1 10); do
            sleep 30
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "$FRONTEND_URL/api/health" 2>/dev/null || echo "000")
            echo "Poll $i/10: $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "Health poll failed — triggering rollback"
              FAILED=1
              break
            fi
          done

          if [ "$FAILED" = "1" ]; then
            echo "Health watch failed"
            exit 1
          fi

          echo "Live watch passed"

  rollback_firebase_on_live_failure:
    name: Roll back Firebase Hosting (prod only)
    if: always() && inputs.environment == 'production' && needs.release.result == 'success' && needs.live_health_watch.result == 'failure'
    runs-on: ubuntu-latest
    needs: [release, live_health_watch]
    permissions:
      id-token: write
    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Authenticate as Firebase CI service account
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          service_account: firebase-cicd-${{ inputs.suffix }}@tfcd-infra.iam.gserviceaccount.com
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}

      - name: Set up Node.js for Firebase rollback
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Roll back Firebase Hosting
        env:
          FIREBASE_PROJECT: ${{ inputs.firebase_project_id }}
        run: |
          npm install -g firebase-tools
          firebase hosting:rollback \
            --project "$FIREBASE_PROJECT" \
            --force

  promote_cloudrun_direct_traffic:
    name: Promote Cloud Run direct traffic (prod only)
    if: always() && inputs.environment == 'production' && needs.release.result == 'success' && needs.live_health_watch.result == 'success'
    runs-on: ubuntu-latest
    needs: [release, live_health_watch]
    permissions:
      id-token: write
    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          service_account: run-traffic-cicd-${{ inputs.suffix }}@tfcd-infra.iam.gserviceaccount.com
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}

      - name: Move Cloud Run direct traffic
        env:
          SERVICE: nnow-${{ inputs.suffix }}
          PROJECT: ${{ inputs.gcp_project }}
          NEW_REVISION: ${{ needs.release.outputs.new_revision }}
        run: |
          if [ -n "$NEW_REVISION" ]; then
            echo "Live watch passed; moving Cloud Run direct traffic to $NEW_REVISION"
            gcloud run services update-traffic "$SERVICE" \
              --region asia-southeast1 \
              --project "$PROJECT" \
              --to-revisions "${NEW_REVISION}=100"
          else
            echo "::warning::No new revision was captured; Cloud Run direct traffic was not changed."
          fi

          echo "Live watch passed — deployment is stable"
