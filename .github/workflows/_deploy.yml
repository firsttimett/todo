name: Deploy pipeline

on:
  workflow_call:
    inputs:
      # ── Required for all environments ────────────────────────────────────────
      environment:
        required: true
        type: string
      frontend_url:
        required: true
        type: string
      suffix:
        required: true
        type: string
      gcp_project:
        required: true
        type: string
      terraform_dir:
        required: true
        type: string
      firebase_project_id:
        required: true
        type: string

      # ── Staging-only ──────────────────────────────────────────────────────────
      use_otp_bypass:
        required: false
        type: boolean
        default: false
        description: "Pass OTP_BYPASS_CODE secret to Terraform. Staging only — never set for production."
      run_e2e:
        required: false
        type: boolean
        default: false
        description: "Run E2E tests against a pre-flip Firebase preview channel before traffic flip. Enable for staging."

      # ── Production / image promotion ──────────────────────────────────────────
      git_sha:
        required: false
        type: string
        default: ""
        description: "SHA to tag the image with or promote. Defaults to github.sha when empty; set explicitly for production promotion."
      skip_build:
        required: false
        type: boolean
        default: false
        description: "Skip Docker build/push and deploy an existing image. Set to true for production promotion."

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  id-token: write

jobs:
  terraform_plan:
    name: Terraform plan
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    env:
      TF_VAR_jwt_public_key: ${{ secrets.JWT_PUBLIC_KEY }}
      TF_VAR_jwt_private_key: ${{ secrets.JWT_PRIVATE_KEY }}
      TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}
      TF_VAR_resend_from_email: ${{ secrets.RESEND_FROM_EMAIL }}
      TF_VAR_otp_bypass_code: ${{ inputs.use_otp_bypass && secrets.OTP_BYPASS_CODE || '' }}

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ inputs.terraform_dir }}
        run: terraform init

      - name: Terraform plan
        working-directory: ${{ inputs.terraform_dir }}
        run: terraform plan -out=tfplan

      - name: Post plan to job summary
        working-directory: ${{ inputs.terraform_dir }}
        run: |
          echo "<details><summary>Terraform plan — ${{ inputs.environment }}</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: Upload plan artifact
        if: inputs.environment == 'production'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-production-${{ github.run_id }}
          path: ${{ inputs.terraform_dir }}/tfplan
          retention-days: 1

      - name: Terraform apply (staging)
        if: inputs.environment != 'production'
        working-directory: ${{ inputs.terraform_dir }}
        run: terraform apply tfplan

  terraform_gate:
    name: Approve Terraform apply
    # Pauses for a reviewer to inspect the plan summary in terraform_plan before proceeding.
    # Requires the "production-gate" GitHub environment to have a required reviewer configured.
    # The "production" environment must NOT have a reviewer — all other prod jobs use it without pausing.
    if: inputs.environment == 'production'
    runs-on: ubuntu-latest
    needs: [terraform_plan]
    environment:
      name: production-gate

    steps:
      - name: Acknowledge
        run: echo "Plan reviewed and approved. Terraform apply will now proceed."

  terraform_apply:
    name: Terraform apply (production)
    if: inputs.environment == 'production'
    runs-on: ubuntu-latest
    needs: [terraform_plan, terraform_gate]
    environment:
      name: ${{ inputs.environment }}
    env:
      TF_VAR_jwt_public_key: ${{ secrets.JWT_PUBLIC_KEY }}
      TF_VAR_jwt_private_key: ${{ secrets.JWT_PRIVATE_KEY }}
      TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}
      TF_VAR_resend_from_email: ${{ secrets.RESEND_FROM_EMAIL }}

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ inputs.terraform_dir }}
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-production-${{ github.run_id }}
          path: ${{ inputs.terraform_dir }}

      - name: Terraform apply
        working-directory: ${{ inputs.terraform_dir }}
        run: terraform apply tfplan

  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [terraform_plan, terraform_gate, terraform_apply]
    if: |
      always() &&
      needs.terraform_plan.result == 'success' &&
      (needs.terraform_gate.result == 'success' || needs.terraform_gate.result == 'skipped') &&
      (needs.terraform_apply.result == 'success' || needs.terraform_apply.result == 'skipped')
    environment:
      name: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}

      - name: Build and deploy app
        uses: ./.github/actions/build-deploy-cloudrun
        with:
          image: asia-southeast1-docker.pkg.dev/tfcd-infra/nnow/backend:${{ inputs.git_sha || github.sha }}
          service: nnow-${{ inputs.suffix }}
          project: ${{ inputs.gcp_project }}
          revision_tag: new
          skip_build: ${{ inputs.skip_build }}

  e2e:
    name: E2E tests (pre-flip)
    if: inputs.run_e2e && inputs.environment == 'staging'
    runs-on: ubuntu-latest
    needs: [deploy]
    environment:
      name: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies and Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Compute short SHA for channel ID
        id: sha
        run: |
          SHA="${{ inputs.git_sha || github.sha }}"
          echo "short=${SHA:0:8}" >> $GITHUB_OUTPUT

      - name: Generate firebase.json (rewrite to new-tagged revision)
        working-directory: frontend
        run: ENV=${{ inputs.suffix }} TAG=new envsubst < firebase.json.tpl > firebase.json

      - name: Deploy pre-flip preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        id: firebase-preview
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ inputs.firebase_project_id }}
          channelId: pre-${{ steps.sha.outputs.short }}
          expires: 30m
          entryPoint: frontend

      - name: Warm up new Cloud Run revision
        uses: ./.github/actions/warm-up-revision
        with:
          service: nnow-${{ inputs.suffix }}
          project: ${{ inputs.gcp_project }}
          tag: new

      - name: Run E2E tests against pre-flip preview
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.firebase-preview.outputs.details_url }}
          OTP_BYPASS_CODE: ${{ secrets.OTP_BYPASS_CODE }}
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ inputs.environment }}-pre-flip
          path: frontend/playwright-report/
          retention-days: 7

  smoke:
    name: Smoke test (pre-flip)
    if: inputs.environment == 'production'
    runs-on: ubuntu-latest
    needs: [deploy]
    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}

      - name: Smoke test new revision
        run: |
          REVISION_URL=$(gcloud run services describe nnow-${{ inputs.suffix }} \
            --project=${{ inputs.gcp_project }} \
            --region=asia-southeast1 \
            --format=json \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for t in data.get('status', {}).get('traffic', []):
              if t.get('tag') == 'new':
                  print(t.get('url', ''))
                  sys.exit(0)
          print('')
          ")
          echo "Smoke-testing revision: $REVISION_URL"

          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$REVISION_URL/health")
          [ "$STATUS" = "200" ] || { echo "Health check failed: $STATUS"; exit 1; }
          echo "Health: OK"

          # Expect 401 without a token — 5xx or connection error means something is wrong
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$REVISION_URL/api/todo/todos" || echo "000")
          [ "$STATUS" = "401" ] || { echo "Auth guard failed: expected 401, got $STATUS"; exit 1; }
          echo "Auth guard: OK"

  release:
    name: Release to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [deploy, e2e, smoke]
    if: |
      always() &&
      needs.deploy.result == 'success' &&
      (needs.e2e.result == 'success' || needs.e2e.result == 'skipped') &&
      (needs.smoke.result == 'success' || needs.smoke.result == 'skipped')
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.frontend_url }}

    outputs:
      frontend_url: ${{ steps.firebase-deploy.outputs.details_url || inputs.frontend_url }}
      prev_revision: ${{ steps.prev.outputs.revision }}

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}

      - name: Capture current serving revision
        id: prev
        run: |
          PREV=$(gcloud run services describe nnow-${{ inputs.suffix }} \
            --region asia-southeast1 \
            --project ${{ inputs.gcp_project }} \
            --format=json \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          traffic = data.get('status', {}).get('traffic', [])
          for t in sorted(traffic, key=lambda x: x.get('percent', 0), reverse=True):
              if not t.get('tag') and t.get('percent', 0) > 0:
                  print(t.get('revisionName', ''))
                  sys.exit(0)
          sys.exit(0)
          " 2>/dev/null || true)
          echo "Previous revision: $PREV"
          echo "revision=$PREV" >> $GITHUB_OUTPUT

      - name: Flip traffic to new revision
        run: |
          gcloud run services update-traffic nnow-${{ inputs.suffix }} \
            --region asia-southeast1 \
            --project ${{ inputs.gcp_project }} \
            --to-tags new=100

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=critical
          npm run build

      - name: Generate firebase.json for env
        working-directory: frontend
        run: ENV=${{ inputs.suffix }} TAG="" envsubst < firebase.json.tpl | jq 'del(.hosting.rewrites[].run.tag)' > firebase.json

      - name: Deploy frontend to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        id: firebase-deploy
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ inputs.firebase_project_id }}
          channelId: live
          entryPoint: frontend

  post_flip_watch:
    name: Post-flip health watch
    # Polls the live frontend every 30s for 5 minutes after the traffic flip.
    # Rolls back Cloud Run traffic to the previous revision if any poll fails.
    # Cloud Monitoring 5xx-rate check is a future enhancement once revision-level
    # metric filtering and IAM permissions are verified.
    #
    # always() is required: e2e is skipped for production, and GitHub Actions
    # propagates skip status transitively through the dependency chain. Without
    # always(), this job is skipped even though release succeeded.
    if: always() && inputs.environment == 'production' && needs.release.result == 'success'
    runs-on: ubuntu-latest
    needs: [release]
    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_RESOURCE_NAME }}
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}

      - name: Watch health and roll back on failure
        env:
          SERVICE: nnow-${{ inputs.suffix }}
          PROJECT: ${{ inputs.gcp_project }}
          PREV_REVISION: ${{ needs.release.outputs.prev_revision }}
          FRONTEND_URL: ${{ inputs.frontend_url }}
        run: |
          echo "Watching for 5 minutes post-flip (10 polls × 30s)"
          FAILED=0

          for i in $(seq 1 10); do
            sleep 30
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "$FRONTEND_URL/api/health" 2>/dev/null || echo "000")
            echo "Poll $i/10: $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "Health poll failed — triggering rollback"
              FAILED=1
              break
            fi
          done

          if [ "$FAILED" = "1" ]; then
            if [ -n "$PREV_REVISION" ]; then
              echo "Rolling back to $PREV_REVISION"
              gcloud run services update-traffic "$SERVICE" \
                --region asia-southeast1 \
                --project "$PROJECT" \
                --to-revisions "${PREV_REVISION}=100"
            else
              echo "No previous revision captured — manual rollback required via rollback.yml"
            fi
            exit 1
          fi

          echo "Post-flip watch passed — deployment is stable"
